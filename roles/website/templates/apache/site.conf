{% if website_domain_aliases is defined -%}
<VirtualHost *:80>
    ServerName {{ website_domain_aliases[0] }}
    ServerAlias {{ website_domain_aliases|join(" ") }}
    {% if website_force_ssl -%}
    Redirect permanent / https://{{ website_domain }}/
    {% endif %}
</VirtualHost>

{% if website_ssl != "off" %}
<VirtualHost *:443>
    SSLEngine on
    {% if website_ssl == "custom" -%}
    SSLCertificateFile /etc/ssl/certs/{{ website_domain }}.chained.ssl.crt
    SSLCertificateKeyFile /etc/ssl/private/{{ website_domain }}.ssl.key
    {% elif website_ssl == "letsencrypt" %}
    SSLCertificateFile /etc/letsencrypt/live/{{ website_letsencrypt_domain }}/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/{{ website_letsencrypt_domain }}/privkey.pem
    {% else %}
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
    {% endif %}
    <FilesMatch "\.(cgi|shtml|phtml|php)$">
        SSLOptions +StdEnvVars
    </FilesMatch>
    <Directory /usr/lib/cgi-bin>
        SSLOptions +StdEnvVars
    </Directory>
    BrowserMatch "MSIE [2-6]" nokeepalive ssl-unclean-shutdown downgrade-1.0 \
                              force-response-1.0
    BrowserMatch "MSIE [17-9]" ssl-unclean-shutdown

    ServerName {{ website_domain_aliases[0] }}
    ServerAlias {{ website_domain_aliases|join(" ") }}
    Redirect permanent / https://{{ website_domain }}/
</VirtualHost>
{% endif %}

{% endif %}

<VirtualHost *:80>
    ServerName {{ website_domain }}
    {% if website_domain_aliases_without_redirect is defined %}
    ServerAlias {{ website_domain_aliases_without_redirect|join(" ") }}
    {% endif -%}
    {% if website_force_ssl -%}
        Redirect permanent / https://{{ website_domain }}/
    {% else %}
        DocumentRoot {{ website_document_root|default('/var/www/' ~ website_domain) }}
        {% if website_document_root|default(False) %}
          <Directory {{ website_document_root }}>
            Require all granted
          </Directory>
        {% endif %}

        RequestHeader set X-Scheme http

        {% if website_use_awstats %}
        Redirect permanent /awstats/ /cgi-bin/awstats.pl?config={{ website_domain }}
        <Location /cgi-bin/awstats.pl>
            AuthType {{ website_awstats_auth_type }}
            AuthName "Awstats"
            {{ website_awstats_extra_config }}
            {% if website_awstats_auth_type == "Basic" %}
            AuthUserFile /etc/{{ website_webserver_dirname }}/{{ website_domain }}.htpasswd
            {% endif %}
            Require user {% for user in website_awstats_users %}{{ user.username }} {% endfor +%}
        </Location>
        Alias /awstats-icon/ /usr/share/awstats/icon/
        {% endif %}

        {% if website_extras is defined -%}
        {{ website_extras|replace("\n", "\n    ")|trim }}
        {%- endif %}

        {% if website_nonssl_extras is defined -%}
        {{ website_nonssl_extras|replace("\n", "\n    ")|trim }}
        {%- endif %}

        IncludeOptional /etc/{{ website_webserver_dirname }}/snippets/{{ website_domain }}/*.conf
    {%- endif %}

</VirtualHost>

{% if website_ssl != "off" %}
<VirtualHost *:443>
