{% if website_domain_aliases is defined -%}
server {
    listen              80;
    listen              [::]:80;
    {% if website_ssl != "off" %}
    listen              443 ssl;
    listen              [::]:443 ssl;
    {% if website_ssl == "letsencrypt" -%}
    ssl_certificate     /etc/letsencrypt/live/{{ website_letsencrypt_domain }}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{ website_letsencrypt_domain }}/privkey.pem;
    {% elif website_ssl == "custom" %}
    ssl_certificate     /etc/ssl/certs/{{ website_domain }}.chained.ssl.crt;
    ssl_certificate_key /etc/ssl/private/{{ website_domain }}.ssl.key;
    {% else %}
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    {% endif -%}
    {% endif %}
    server_name         {{ website_domain_aliases|join(" ") }};
    {% if website_force_ssl -%}
    return              302 https://{{ website_domain }}$request_uri;
    {% else %}
    return              302 $scheme://{{ website_domain }}$request_uri;
    {% endif %}
}

{% endif -%}
server {
    listen              80;
    listen              [::]:80;
    server_name         {{ website_domain }} {{ website_domain_aliases_without_redirect|default("")|join(" ") }};
    root                {{ website_document_root }};

    {% if website_force_ssl -%}
    return 302 https://{{ website_domain }}$request_uri;
    {%- endif %}

    {% if website_extras is defined -%}
    {{ website_extras|replace("\n", "\n    ")|trim }}
    {%- endif %}

    {% if website_nonssl_extras is defined -%}
    {{ website_nonssl_extras|replace("\n", "\n    ")|trim }}
    {%- endif %}

    {% if not website_force_ssl -%}
    include /etc/{{ website_webserver_dirname }}/snippets/{{ website_domain }}/*.conf;
    {%- endif %}
}

{% if website_ssl != "off" %}
server {
    listen              443 ssl http2;
    listen              [::]:443 ssl http2;
    {% if website_ssl == "letsencrypt" -%}
    ssl_certificate     /etc/letsencrypt/live/{{ website_letsencrypt_domain }}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{ website_letsencrypt_domain }}/privkey.pem;
    {% elif website_ssl == "custom" %}
    ssl_certificate     /etc/ssl/certs/{{ website_domain }}.chained.ssl.crt;
    ssl_certificate_key /etc/ssl/private/{{ website_domain }}.ssl.key;
    {% else %}
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    {% endif -%}
    gzip                off;  # Avoid CRIME exploit

    server_name         {{ website_domain }} {{ website_domain_aliases_without_redirect|default("")|join(" ") }};
    root                {{ website_document_root }};

    {% if website_extras is defined -%}
    {{ website_extras|replace("\n", "\n    ")|trim }}
    {%- endif %}

    {% if website_ssl_extras is defined -%}
    {{ website_ssl_extras|replace("\n", "\n    ")|trim }}
    {%- endif %}

    include /etc/{{ website_webserver_dirname }}/snippets/{{ website_domain }}/*.conf;
}
{% endif %}
