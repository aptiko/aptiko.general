---
- name: Reload Postfix
  ansible.builtin.service:
    name: postfix
    state: reloaded

- name: Postmap aliases
  ansible.builtin.command: postmap /etc/postfix/virtual
  changed_when: true

- name: Compile sasl_passwd
  ansible.builtin.command: postmap /etc/postfix/sasl_passwd
  changed_when: true
