<VirtualHost *:80>
    # We set an irrelevant ServerName here, otherwise it will assume the fqdn,
    # which might interfere with the VirtualHost block that explicitly
    # specifies the fqdn as ServerName. Same thing with the 443 block below.
    ServerName default
    {% if webserver_default_site_force_ssl -%}
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [redirect=permanent,last]
    {% else %}
    IncludeOptional snippets/default-site/*.conf
    {% endif %}
</VirtualHost>

<VirtualHost _default_:443>
    ServerName default

    SSLEngine on
  {% if webserver_default_site_letsencrypt_domain %}
    SSLCertificateFile /etc/letsencrypt/live/{{ webserver_default_site_letsencrypt_domain | regex_replace('^\*\.', '') }}/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/{{ webserver_default_site_letsencrypt_domain | regex_replace('^\*\.', '') }}/privkey.pem
    RequestHeader set X-Scheme https
  {% else %}
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
  {% endif %}

    IncludeOptional snippets/default-site/*.conf
</VirtualHost>
